}

body{
    display:flex;
    flex-direction:column;
}

/* Header */

header{
    position:fixed;
    top:0;

    justify-content:center;

nav{
    display:flex;

nav a{

    letter-spacing:1px;

}

nav a:hover,
nav a.active{

}

/* Main */

main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:140px 40px 80px;
}

.container{
    width:100%;
    max-width:900px;
}

h1{
    font-size:clamp(2.8rem,6vw,4.5rem);
    font-weight:900;
    letter-spacing:4px;
    margin-bottom:20px;
}

.subtitle{
    font-size:1rem;
    color:#888;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:50px;
}

section{
    margin-bottom:55px;
}

h2{
    font-size:1.5rem;
    margin-bottom:18px;
    font-weight:700;
}

p{
    font-size:1.05rem;
    line-height:1.9;
    color:#333;
    margin-bottom:20px;
}

hr{
    border:none;
    border-top:1px solid #e5e5e5;
    margin:50px 0;
}

/* Footer */

footer{
    text-align:center;
    padding:22px;
    border-top:1px solid #ddd;
    font-size:.9rem;
}

footer a{
    color:#000;
    font-weight:700;
    text-decoration:none;
}

footer a:hover{
    text-decoration:underline;
}

/* Mobile */

@media (max-width:600px){

    header{
        padding:18px 20px;
    }

    nav{
        gap:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    nav a{
        font-size:.8rem;
    }

    main{
        padding:120px 24px 60px;
    }

}
</style>
