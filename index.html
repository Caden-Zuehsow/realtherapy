<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.E.A.L Therapy Services</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:Arial, Helvetica, sans-serif;
    background:#fff;
    color:#000;
}

body{
    display:flex;
    flex-direction:column;
}

/* Minimal Header */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:24px 40px;
    display:flex;
    justify-content:center;
    z-index:100;
    background:transparent;
}

nav{
    display:flex;
    gap:40px;
}

nav a{
    color:#999;
    text-decoration:none;
    font-size:.9rem;
    font-weight:600;
    letter-spacing:1px;
    transition:.25s;
}

nav a:hover{
    color:#000;
}

/* Main Content */

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.content{
    max-width:900px;
}

h1{
    font-size:clamp(4rem,10vw,8rem);
    font-weight:900;
    letter-spacing:8px;
    margin-bottom:25px;
}

.tagline{
    font-size:clamp(1.2rem,2vw,2rem);
    font-weight:800;
    letter-spacing:1px;
    margin-bottom:45px;
}

.tagline a{
    color:#000;
    text-decoration:none;
    font-weight:800;
    transition:.2s;
}

.tagline a:hover{
    text-decoration:underline;
}

.phone{
    font-size:clamp(1.4rem,2.4vw,2.2rem);
    font-weight:700;
    color:#000;
    text-decoration:none;
    transition:.2s;
}

.phone:hover{
    opacity:.65;
}

/* Footer */

footer{
    text-align:center;
    padding:22px;
    border-top:1px solid #ddd;
    font-size:.9rem;
}

footer a{
    color:#000;
    font-weight:700;
    text-decoration:none;
}

footer a:hover{
    text-decoration:underline;
}

/* Mobile */

@media (max-width:600px){

    header{
        padding:18px 20px;
    }

    nav{
        gap:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    nav a{
        font-size:.8rem;
    }

    h1{
        letter-spacing:4px;
    }

    .tagline{
        line-height:1.6;
    }
}
</style>

</head>
<body>

<header>
    <nav>
        <a href="/">Home</a>
        <a href="about/">About</a>
        <a href="contact/">Contact</a>
         <a href="book-session/">Book Session</a>
        </a>
    </nav>
</header>

            <a href="engagement/ ">Engagement</a> |
            <a href="acceptance/ ">Acceptance</a> |
            <a href="lifeskills/ ">Life Skills</a>
        </div>

        <a class="phone" href="tel:6166993760">
            616-699-3760
        </a>

    </div>

</main>

<footer>

    </a>
</footer>

</body>
</html>
